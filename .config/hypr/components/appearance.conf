general {
    # Inner gaps between windows:
    gaps_in = 5

    # Outer gaps between windows and screen edge:
    gaps_out = 16

    # Extra spacing between workspaces:
    gaps_workspaces = 50

    border_size = 2
    allow_tearing = false
    col.active_border = noborder
    col.inactive_border = noborder
    layout = dwindle
}

decoration {
    # Controls how rounded corners are calculated (higher = sharper curve behavior):
    rounding_power = 2

    # Window corner radius:
    rounding = 15

    active_opacity = 0.93

    blur {
        enabled = true
        size = 2
        contrast = 0.89

        # Color vibrancy boost:
        vibrancy = 0.5
        vibrancy_darkness = 0.5

        # Disable blur on popups:
        popups = false

        # Enable blur for input method windows (IME, etc.):
        input_methods = true

        # Alpha threshold for IME blur:
        input_methods_ignorealpha = 0.8
    }

    shadow {
        enabled = true

        # Ignore windows when calculating shadow (prevents stacking artifacts):
        ignore_window = true

        # Shadow spread radius:
        range = 50

        # Shadow offset (x y):
        offset = 0 4

        # Shadow rendering intensity/quality:
        render_power = 10

        color = rgba(00000027)
    }
    dim_inactive = true
    dim_strength = 0.05
    dim_special = 0.2
}

cursor {
    # Cursor zoom level (for accessibility):
    zoom_factor = 1

    zoom_rigid = false

    # Disable anti-aliasing when zoomed (sharper but jagged):
    zoom_disable_aa = true

    hotspot_padding = 1
    inactive_timeout = 0
}
