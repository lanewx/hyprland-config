#! WARNING
# Note that when using the env keyword, Hyprland reads the value of the variable as a raw string and puts it into the # environment as is.
# You should NOT add quotes "" around the values.


# Helps apps correctly detect Hyprland session:
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Qt: prefer Wayland, fallback to X11 if needed
env = QT_QPA_PLATFORM,wayland;xcb

# Qt: disable server-side decorations (fixes double borders in some apps)
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

# Qt: tells based applications to pick your theme from qt5ct, use with Kvantum
env = QT_QPA_PLATFORMTHEME,qt5ct

# env = GTK_THEME,...

# XCursor (XWayland apps):
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24

# Hyprland cursor (Wayland-native):
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24
