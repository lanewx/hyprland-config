source = ~/.config/hypr/conf/variables.conf

# Wayland:
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# Core XDG / session:
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland

# Toolkit / UI Backends:
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland,x11
env = GTK_USE_PORTAL,1

# Configs and cache location:
env = XDG_CONFIG_HOME, $HOME/.config # !DONT MODIFY CURRENT PATH
env = XDG_CACHE_HOME, $HOME/.cache # !DONT MODIFY CURRENT PATH
env = XDG_DATA_HOME, $HOME/.local/share # !DONT MODIFY CURRENT PATH

# Locale:
env = LANG, en_US.UTF-8
# env = LANG, ru_RU.UTF-8
env = LC_CTYPE, en_US.UTF-8
env = LC_TIME, en_US.UTF-8
env = LC_COLLATE, en_US.UTF-8
env = LC_NUMERIC, en_US.UTF-8
env = LC_MONETARY, en_US.UTF-8
env = LC_MEASUREMENT, en_US.UTF-8
env = LC_PAPER, en_US.UTF-8

# Cursor:
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,25

# Terminal application:
env = TERMINAL,$term -1

# Firefox Wayland:
env = MOZ_ENABLE_WAYLAND,1
