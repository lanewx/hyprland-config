# Import shared variables:
source = ~/.config/hypr/conf/variables.conf

# Enable native Wayland support for Electron/Chromium apps (VSCode, Discord, etc.):
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# Firefox Wayland backend (better performance, smoother scrolling):
env = MOZ_ENABLE_WAYLAND,1

# Helps apps correctly detect Hyprland session:
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Qt: prefer Wayland, fallback to X11 if needed
env = QT_QPA_PLATFORM,wayland;xcb

# Qt theming (qt6ct required):
env = QT_QPA_PLATFORMTHEME,qt6ct

# Disable server-side decorations (fixes double borders in some apps):
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

# GTK: prefer Wayland, fallback to X11:
env = GDK_BACKEND,wayland,x11

# Use xdg-desktop-portal for file pickers, screenshots, etc.:
env = GTK_USE_PORTAL,1

# XDG Base Directories:
#? Standard Linux directory layout (used by most modern apps)
env = XDG_CONFIG_HOME,$HOME/.config
env = XDG_CACHE_HOME,$HOME/.cache
env = XDG_DATA_HOME,$HOME/.local/share

# Locale:
#? System-wide language (use LC_ALL to avoid partial overrides)
env = LANG,en_US.UTF-8
env = LC_ALL,en_US.UTF-8
# env = LANG,ru_RU.UTF-8

# XCursor (XWayland apps):
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24

# Hyprland cursor (Wayland-native):
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24



