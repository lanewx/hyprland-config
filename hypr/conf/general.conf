general {
    # Inner gaps between windows (in pixels):
    gaps_in = 4

    # Outer gaps between windows and screen edge:
    gaps_out = 8

    # Extra spacing between workspaces (useful for workspace animations/visual separation):
    gaps_workspaces = 50

    border_size = 3

    col.active_border = rgb(b4befe)
    col.inactive_border = rgb(45475a)

    layout = dwindle

    # Allows resizing windows by dragging borders:
    resize_on_border = true

    # If no window is focusable, fallback behavior prevents "no focus" state:
    no_focus_fallback = true

    # Required for some apps/games that need tearing (disables strict vsync in some cases):
    allow_tearing = true # Needed for `immediate` window rule
}

decoration {
    # Controls how rounded corners are calculated (higher = sharper curve behavior):
    rounding_power = 2

    # Window corner radius:
    rounding = 12

    blur {
        enabled = true

        # Allows blur behind transparent windows even if occluded:
        xray = true

        # Disable blur on special workspaces:
        special = false

        # New optimized blur method (recommended):
        new_optimizations = true

        # Blur radius size:
        size = 2

        # Number of blur passes (higher = smoother but more GPU usage):
        passes = 3

        # Brightness of blurred area
        brightness = 1:

        # Adds grain/noise to blur (helps reduce banding):
        noise = 0.05

        contrast = 0.89

        # Color vibrancy boost:
        vibrancy = 0.5
        vibrancy_darkness = 0.5

        # Disable blur on popups:
        popups = false

        # Ignore alpha below this threshold for popups:
        popups_ignorealpha = 0.6

        # Enable blur for input method windows (IME, etc.):
        input_methods = true

        # Alpha threshold for IME blur:
        input_methods_ignorealpha = 0.8
    }

    shadow {
        enabled = true

        # Ignore windows when calculating shadow (prevents stacking artifacts):
        ignore_window = true

        # Shadow spread radius:
        range = 50

        # Shadow offset (x y):
        offset = 0 4

        # Shadow rendering intensity/quality:
        render_power = 10

        # Shadow color (rgba):
        color = rgba(00000027)
    }

    dim_inactive = true
    dim_strength = 0.05
    dim_special = 0.2
}

animations {
    enabled = true

    # Custom bezier curves (used by animations below):
    bezier = expressiveFastSpatial, 0.42, 1.67, 0.21, 0.90
    bezier = expressiveSlowSpatial, 0.39, 1.29, 0.35, 0.98
    bezier = expressiveDefaultSpatial, 0.38, 1.21, 0.22, 1.00
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
    bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15
    bezier = standardDecel, 0, 0, 0, 1
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.52, 0.03, 0.72, 0.08
    bezier = stall, 1, -0.1, 0.7, 0.85

    # Window animations (open/close/move):
    animation = windowsIn, 1, 3, emphasizedDecel, popin 80%
    animation = fadeIn, 1, 3, emphasizedDecel
    animation = windowsOut, 1, 2, emphasizedDecel, popin 90%
    animation = fadeOut, 1, 2, emphasizedDecel
    animation = windowsMove, 1, 3, emphasizedDecel, slide

    # Border animation (color/size transitions):
    animation = border, 1, 10, emphasizedDecel

    # Layer animations (panels, overlays, etc.):
    animation = layersIn, 1, 2.7, emphasizedDecel, popin 93%
    animation = layersOut, 1, 2.4, menu_accel, popin 94%

    # Layer fade transitions:
    animation = fadeLayersIn, 1, 0.5, menu_decel
    animation = fadeLayersOut, 1, 2.7, stall

    # Workspace switching animation:
    animation = workspaces, 1, 7, menu_decel, slide

    # Special workspace animations (scratchpads, etc.):
    animation = specialWorkspaceIn, 1, 2.8, emphasizedDecel, slidevert
    animation = specialWorkspaceOut, 1, 1.2, emphasizedAccel, slidevert

    # Zoom animation (used by some plugins/features):
    animation = zoomFactor, 1, 3, standardDecel
}

misc {
    # Disable Hyprland logo on startup:
    disable_hyprland_logo = true

    # Disable splash screen animation:
    disable_splash_rendering = true

    # Variable frame rate (saves power when idle):
    vfr = 1

    # Variable refresh rate (adaptive sync / FreeSync / G-Sync):
    vrr = 1

    # Wake display when mouse moves:
    mouse_move_enables_dpms = true

    # Wake display when key is pressed:
    key_press_enables_dpms = true

    # Disable animations when resizing manually:
    animate_manual_resizes = false

    # Disable animations when dragging windows with mouse:
    animate_mouse_windowdragging = false

    # Focus behavior when a fullscreen window exists:
    # 0 = block focus, 1 = allow, 2 = smart (recommended)
    on_focus_under_fullscreen = 2

    # Restore session after lock:
    allow_session_lock_restore = true

    # Allow seeing through lockscreen (for blur/transparency effects):
    session_lock_xray = true

    # Disable tracking of initial workspace per monitor:
    initial_workspace_tracking = false

    # Automatically focus window when it becomes active:
    focus_on_activate = true
}

cursor {
    # Cursor zoom level (for accessibility):
    zoom_factor = 1

    zoom_rigid = false

    # Disable anti-aliasing when zoomed (sharper but jagged):
    zoom_disable_aa = true

    # Padding around cursor hotspot:
    hotspot_padding = 1
}

input {
    # Keyboard layouts (toggle between languages):
    kb_layout = us, ru

    # Focus follows mouse (1 = yes):
    follow_mouse = 1

    # Adaptive acceleration profile:
    accel_profile = adaptive

    # Key repeat speed (higher = faster):
    repeat_rate = 50

    # Delay before key repeat starts (ms):
    repeat_delay = 600

    # Enable numlock on startup:
    numlock_by_default = true
}

# Mouse bindings (hold SUPER + mouse buttons):
# 272 = left click → move window
bindm = SUPER, mouse:272, movewindow

# 273 = right click → resize window
bindm = SUPER, mouse:273, resizewindow
