# * UI: Bar & Notifications
# Waybar → main status bar (workspaces, system info, modules)
exec-once = waybar

# SwayNC → notification daemon (Wayland-native, replaces dunst)
exec-once = swaync

# * Core Session Services
# Export Wayland session variables to systemd (fixes app/env issues):
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Audio stack:
# pipewire        → core audio/video server
# pipewire-pulse  → PulseAudio compatibility layer
# wireplumber     → session / device manager
exec-once = pipewire & pipewire-pulse & wireplumber

# Wallpaper daemon (lightweight, GPU-accelerated):
exec-once = hyprpaper
exec-once = hyprlock

# * Idle & Lock
# Hypridle → handles idle timeout, triggers hyprlock:
exec-once = hypridle

# * Network:
# NetworkManager tray applet (Wi-Fi, VPN, etc.)
exec-once = nm-applet

