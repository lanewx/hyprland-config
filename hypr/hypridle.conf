general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session    # lock before suspend.
    after_sleep_cmd = hyprctl dispatch dpms on  # to avoid having to press a key twice to turn on the display.
}

# Dim screen (soft idle):
listener {
    timeout = 120 # 2min
    on-timeout = brightnessctl -s && brightnessctl s 10% # Save and set brightness to 10%
    on-resume = brightnessctl -r # Restore brightness on activity
}

# Lock screen:
listener {
    timeout = 120 # 2min
    on-timeout = loginctl lock-session
}

# Turn off screen (DPMS):
listener {
    timeout = 300
    on-timeout = hyprctl dispatch dpms off # Turn off display
    on-resume = hyprctl dispatch dpms on   # Turn display back on
}

# Suspend system:
listener {
    timeout = 1800 # 30min
    on-timeout = systemctl suspend
}
